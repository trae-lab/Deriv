<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DigitTools Pro Terminal</title>
  <style>
    :root {
      --bg-base: #07090e;
      --card-bg: rgba(18, 22, 32, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-border-glow: rgba(0, 242, 254, 0.2);
      
      --text-main: #f8fafc;
      --text-muted: #64748b;
      
      --neon-cyan: #00f2fe;
      --neon-teal: #10b981;
      --neon-red: #ff3b30;
      --neon-purple: #8b5cf6;
      --gold: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    body {
      background: radial-gradient(circle at 50% 0%, #111827 0%, var(--bg-base) 70%);
      color: var(--text-main);
      min-height: 100vh;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app-wrapper {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Top Brand & Auth Header */
    .header-bar {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .brand-title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-connect {
      background: linear-gradient(135deg, #3b82f6, var(--neon-purple));
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
      transition: all 0.2s ease;
    }
    .btn-connect:hover { transform: translateY(-1px); box-shadow: 0 0 18px rgba(99, 102, 241, 0.6); }

    .user-account {
      display: flex;
      flex-direction: column;
      text-align: right;
    }
    .account-id { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
    .account-bal { font-size: 16px; font-weight: 800; color: var(--neon-teal); }

    /* Live Market Header Card */
    .market-banner {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .select-market {
      background: rgba(15, 23, 42, 0.8);
      color: var(--text-main);
      border: 1px solid var(--card-border);
      padding: 8px 12px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    .quote-display { text-align: right; }
    .quote-price { font-size: 20px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
    .quote-digit { font-size: 12px; color: var(--neon-cyan); font-weight: 600; margin-top: 2px; }

    /* Ratios Analytics Bar (Even/Odd & Over/Under) */
    .ratio-panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ratio-row { display: flex; flex-direction: column; gap: 4px; }
    .ratio-labels { display: flex; justify-content: space-between; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .bar-track { height: 8px; background: rgba(255, 255, 255, 0.05); border-radius: 4px; overflow: hidden; display: flex; }
    .bar-fill-left { height: 100%; background: var(--neon-teal); transition: width 0.3s ease; }
    .bar-fill-right { height: 100%; background: var(--neon-red); transition: width 0.3s ease; }

    /* Digit Heatmap Grid (0-9) */
    .digit-section {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
    }

    .digit-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .digit-tile {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 10px 4px;
      text-align: center;
      position: relative;
      transition: all 0.2s ease;
    }
    .digit-tile.hot-digit { border-color: var(--neon-teal); box-shadow: inset 0 0 12px rgba(16, 185, 129, 0.2); }
    .digit-tile.cold-digit { border-color: var(--neon-red); box-shadow: inset 0 0 12px rgba(255, 59, 48, 0.2); }
    .digit-tile.active-digit { border-color: var(--neon-cyan); box-shadow: 0 0 15px var(--neon-cyan); transform: scale(1.05); }

    .tile-num { font-size: 18px; font-weight: 800; }
    .tile-pct { font-size: 10px; color: var(--text-muted); font-weight: 600; margin-top: 2px; }

    /* Execution Control Panel */
    .controls-panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .input-row { display: flex; justify-content: space-between; align-items: center; }
    .input-label { font-size: 13px; font-weight: 600; color: var(--text-muted); }
    .input-field {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid var(--card-border);
      color: #fff;
      padding: 8px 12px;
      border-radius: 8px;
      width: 100px;
      text-align: right;
      font-weight: 700;
      font-size: 14px;
    }

    /* Primary Trade Buttons */
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 4px; }
    
    .btn-trade {
      border: none;
      border-radius: 12px;
      padding: 14px;
      color: #fff;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 80px;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-trade:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-even { background: linear-gradient(135deg, #059669, #10b981); box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3); }
    .btn-odd { background: linear-gradient(135deg, #dc2626, #ff3b30); box-shadow: 0 4px 20px rgba(255, 59, 48, 0.3); }

    .btn-trade:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }

    .btn-trade-title { font-size: 18px; font-weight: 800; letter-spacing: 0.5px; }
    .btn-trade-payout { font-size: 11px; display: flex; justify-content: space-between; opacity: 0.9; }

    /* Live History Stream */
    .history-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 14px;
    }

    .history-feed { display: flex; flex-direction: column; gap: 8px; max-height: 140px; overflow-y: auto; }
    .history-item {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--card-border);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .result-win { color: var(--neon-teal); font-weight: 800; }
    .result-loss { color: var(--neon-red); font-weight: 800; }

    /* Status Footer */
    .status-footer { font-size: 11px; color: var(--text-muted); text-align: center; font-family: monospace; }
  </style>
</head>
<body>

  <div class="app-wrapper">
    
    <!-- Top Header Navigation -->
    <div class="header-bar">
      <div class="brand-title">
        <span>⚡ DIGITTOOLS PRO</span>
      </div>
      <button class="btn-connect" id="login-btn">Connect Deriv</button>
      <div class="user-account" id="user-info" style="display: none;">
        <span class="account-id" id="acc-id">CR000000</span>
        <span class="account-bal" id="acc-bal">$0.00</span>
      </div>
    </div>

    <!-- Active Market Card -->
    <div class="market-banner">
      <div>
        <select id="market-selector" class="select-market">
          <option value="1HZ100V">Volatility 100 (1s) Index</option>
          <option value="R_100">Volatility 100 Index</option>
          <option value="1HZ10V">Volatility 10 (1s) Index</option>
          <option value="R_10">Volatility 10 Index</option>
          <option value="1HZ25V">Volatility 25 (1s) Index</option>
        </select>
      </div>
      <div class="quote-display">
        <div class="quote-price" id="price-quote">0.00</div>
        <div class="quote-digit" id="last-digit">LAST DIGIT: -</div>
      </div>
    </div>

    <!-- Even/Odd & Over/Under Live Analysis Bar -->
    <div class="ratio-panel">
      <!-- Even / Odd Bar -->
      <div class="ratio-row">
        <div class="ratio-labels">
          <span style="color:var(--neon-teal)">EVEN: <span id="even-pct">50%</span></span>
          <span style="color:var(--neon-red)">ODD: <span id="odd-pct">50%</span></span>
        </div>
        <div class="bar-track">
          <div class="bar-fill-left" id="even-bar" style="width: 50%;"></div>
          <div class="bar-fill-right" id="odd-bar" style="width: 50%;"></div>
        </div>
      </div>

      <!-- Over (5-9) / Under (0-4) Bar -->
      <div class="ratio-row">
        <div class="ratio-labels">
          <span style="color:var(--neon-cyan)">UNDER (0-4): <span id="under-pct">50%</span></span>
          <span style="color:var(--neon-purple)">OVER (5-9): <span id="over-pct">50%</span></span>
        </div>
        <div class="bar-track">
          <div class="bar-fill-left" id="under-bar" style="width: 50%; background: var(--neon-cyan);"></div>
          <div class="bar-fill-right" id="over-bar" style="width: 50%; background: var(--neon-purple);"></div>
        </div>
      </div>
    </div>

    <!-- 0-9 Digit Frequency Heatmap -->
    <div class="digit-section">
      <div class="section-title">
        <span>Digit Frequency (Last 100 Ticks)</span>
        <span style="color: var(--neon-cyan)" id="ticks-count">100 Ticks</span>
      </div>
      <div class="digit-grid" id="digit-grid"></div>
    </div>

    <!-- Execution Panel -->
    <div class="controls-panel">
      <div class="input-row">
        <span class="input-label">Ticks Duration</span>
        <input type="number" id="ticks-input" class="input-field" value="5" min="1" max="10">
      </div>
      <div class="input-row">
        <span class="input-label">Stake Amount ($)</span>
        <input type="number" id="stake-input" class="input-field" value="10.00" min="0.35" step="1">
      </div>

      <div class="action-grid">
        <button class="btn-trade btn-even" id="buy-even" disabled>
          <div class="btn-trade-title">EVEN</div>
          <div class="btn-trade-payout"><span>Payout:</span><strong id="payout-even">$19.50</strong></div>
        </button>
        <button class="btn-trade btn-odd" id="buy-odd" disabled>
          <div class="btn-trade-title">ODD</div>
          <div class="btn-trade-payout"><span>Payout:</span><strong id="payout-odd">$19.50</strong></div>
        </button>
      </div>
    </div>

    <!-- Trade History -->
    <div class="history-card">
      <div class="section-title">Execution Log</div>
      <div class="history-feed" id="history-feed">
        <div style="font-size:11px; color:var(--text-muted); text-align:center; padding:10px;">Waiting for connection...</div>
      </div>
    </div>

    <div class="status-footer" id="status-footer">Status: Disconnected</div>

  </div>

  <script>
    const APP_ID = 'YOUR_APP_ID'; // Replace with your Deriv App ID
    const WS_URL = `wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`;

    let ws = null;
    let tickHistory = [];
    let proposals = {};
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token1');

    // UI Refs
    const loginBtn = document.getElementById('login-btn');
    const userInfo = document.getElementById('user-info');
    const accId = document.getElementById('acc-id');
    const accBal = document.getElementById('acc-bal');
    const marketSelector = document.getElementById('market-selector');
    const priceQuote = document.getElementById('price-quote');
    const lastDigit = document.getElementById('last-digit');
    const digitGrid = document.getElementById('digit-grid');
    const buyEven = document.getElementById('buy-even');
    const buyOdd = document.getElementById('buy-odd');
    const statusFooter = document.getElementById('status-footer');

    // Build Digit Grid
    for (let i = 0; i <= 9; i++) {
      const tile = document.createElement('div');
      tile.className = 'digit-tile';
      tile.id = `tile-${i}`;
      tile.innerHTML = `<div class="tile-num">${i}</div><div class="tile-pct" id="pct-${i}">0%</div>`;
      digitGrid.appendChild(tile);
    }

    loginBtn.addEventListener('click', () => {
      window.location.href = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}`;
    });

    function connect() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        statusFooter.textContent = 'Connected to Deriv WebSocket';
        if (token) {
          loginBtn.style.display = 'none';
          userInfo.style.display = 'flex';
          ws.send(JSON.stringify({ authorize: token }));
        }
        subscribeMarket(marketSelector.value);
        requestProposals();
      };

      ws.onmessage = (evt) => {
        const data = JSON.parse(evt.data);

        if (data.msg_type === 'authorize') {
          accId.textContent = data.authorize.loginid;
          accBal.textContent = `$${data.authorize.balance}`;
          buyEven.disabled = false;
          buyOdd.disabled = false;
          ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
        }

        if (data.msg_type === 'balance') {
          accBal.textContent = `$${data.balance.balance}`;
        }

        if (data.msg_type === 'history') {
          tickHistory = data.history.prices.map(p => parseInt(p.toString().slice(-1)));
          updateStats();
        }

        if (data.msg_type === 'tick') {
          const price = data.tick.quote;
          const digit = parseInt(price.toString().slice(-1));
          priceQuote.textContent = price;
          lastDigit.textContent = `LAST DIGIT: ${digit}`;

          // Active Tile Glow
          document.querySelectorAll('.digit-tile').forEach(t => t.classList.remove('active-digit'));
          document.getElementById(`tile-${digit}`).classList.add('active-digit');

          tickHistory.push(digit);
          if (tickHistory.length > 100) tickHistory.shift();
          updateStats();
        }

        if (data.msg_type === 'proposal') {
          proposals[data.echo_req.contract_type] = data.proposal.id;
          if (data.echo_req.contract_type === 'DIGITEVEN') document.getElementById('payout-even').textContent = `$${data.proposal.payout}`;
          if (data.echo_req.contract_type === 'DIGITODD') document.getElementById('payout-odd').textContent = `$${data.proposal.payout}`;
        }
      };
    }

    function subscribeMarket(symbol) {
      ws.send(JSON.stringify({ forget_all: 'ticks' }));
      ws.send(JSON.stringify({ ticks_history: symbol, count: 100, end: 'latest', subscribe: 1 }));
    }

    function updateStats() {
      if (!tickHistory.length) return;
      const total = tickHistory.length;
      const counts = Array(10).fill(0);
      let evens = 0, unders = 0;

      tickHistory.forEach(d => {
        counts[d]++;
        if (d % 2 === 0) evens++;
        if (d < 5) unders++;
      });

      // Update Digit Frequency & Heatmap Colors
      counts.forEach((cnt, i) => {
        const pct = Math.round((cnt / total) * 100);
        document.getElementById(`pct-${i}`).textContent = `${pct}%`;
        const tile = document.getElementById(`tile-${i}`);
        tile.classList.remove('hot-digit', 'cold-digit');
        if (pct >= 14) tile.classList.add('hot-digit');
        if (pct <= 6) tile.classList.add('cold-digit');
      });

      // Update Ratio Bars
      const evenPct = Math.round((evens / total) * 100);
      const oddPct = 100 - evenPct;
      document.getElementById('even-pct').textContent = `${evenPct}%`;
      document.getElementById('odd-pct').textContent = `${oddPct}%`;
      document.getElementById('even-bar').style.width = `${evenPct}%`;
      document.getElementById('odd-bar').style.width = `${oddPct}%`;

      const underPct = Math.round((unders / total) * 100);
      const overPct = 100 - underPct;
      document.getElementById('under-pct').textContent = `${underPct}%`;
      document.getElementById('over-pct').textContent = `${overPct}%`;
      document.getElementById('under-bar').style.width = `${underPct}%`;
      document.getElementById('over-bar').style.width = `${overPct}%`;
    }

    function requestProposals() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const stake = parseFloat(document.getElementById('stake-input').value);
      const ticks = parseInt(document.getElementById('ticks-input').value);

      ['DIGITEVEN', 'DIGITODD'].forEach(type => {
        ws.send(JSON.stringify({
          proposal: 1,
          amount: stake,
          basis: 'stake',
          contract_type: type,
          currency: 'USD',
          duration: ticks,
          duration_unit: 't',
          symbol: marketSelector.value
        }));
      });
    }

    marketSelector.addEventListener('change', (e) => {
      subscribeMarket(e.target.value);
      requestProposals();
    });

    document.getElementById('stake-input').addEventListener('change', requestProposals);
    document.getElementById('ticks-input').addEventListener('change', requestProposals);

    connect();
  </script>
</body>
</html>
